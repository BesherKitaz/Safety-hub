services:
  db:
    image: postgres:16
    container_name: safetyhub-db
    environment:
      POSTGRES_USER: safetyhub
      POSTGRES_PASSWORD: safetyhub
      POSTGRES_DB: safetyhub
    ports:
      - "5433:5432"
    volumes:
      - safetyhub_pgdata:/var/lib/postgresql/data

  workspace:
    build:
      context: .
    container_name: safetyhub-workspace
    volumes:
      - .:/workspace
      - /workspace/backend/node_modules
      - /workspace/frontend/node_modules
    working_dir: /workspace
    ports:
      - "3000:3000"
      - "3001:3001"
      - "5555:5555"
    env_file:
      - .env.docker
    depends_on:
      - db
    command: sleep infinity


volumes:
  safetyhub_pgdata: